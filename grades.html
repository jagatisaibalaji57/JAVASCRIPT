<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <!DOCTYPE html>
<html>
<head>
<title>Student Grade</title>
</head>
<body>

<h2>Student Grade Calculator</h2>

<label>Enter Marks:</label>
<input type="number" id="marks">
<br><br>

<button onclick="checkGrade()">Check Grade</button>

<p id="result"></p>

<script>
function checkGrade() {
    let marks = document.getElementById("marks").value;

    if (marks >= 80) {
        document.getElementById("result").innerHTML = "Grade A";
    } 
    else if (marks >= 60) {
        document.getElementById("result").innerHTML = "Grade B";
    } 
    else {
        document.getElementById("result").innerHTML = "Grade C";
    }
}
</script>

</body>
</html>
</body>
</html>
