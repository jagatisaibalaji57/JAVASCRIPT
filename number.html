<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
<title>Number Sign Check</title>
</head>
<body>

<h2>Check Number Sign</h2>

<label>Enter a number:</label>
<input type="number" id="num">
<br><br>

<button onclick="checkNumber()">Check</button>

<p id="result"></p>

<script>
function checkNumber() {
    let number = document.getElementById("num").value;

    if (number > 0) {
        document.getElementById("result").innerHTML = "The number is Positive.";
    } else if (number < 0) {
        document.getElementById("result").innerHTML = "The number is Negative.";
    } else {
        document.getElementById("result").innerHTML = "The number is Zero.";
    }
}
</script>

</body>
</html>
</body>
</html>
