<!DOCTYPE html>

<body>
    <!DOCTYPE html>
<html>
<head>
<title>Voting Eligibility</title>
</head>
<body>

<h2>Check Voting Eligibility</h2>

<label>Enter your age:</label>
<input type="number" id="age">
<br><br>

<button onclick="checkEligibility()">Check</button>

<p id="result"></p>

<script>
function checkEligibility() {
    let age = document.getElementById("age").value;

    if (age >= 18) {
        document.getElementById("result").innerHTML = "You are eligible to vote.";
    } else {
        document.getElementById("result").innerHTML = "You are not eligible to vote.";
    }
}
</script>

</body>
</html>
</body>
</html>
